<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>顶点分类调试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
canvas{display:block}
#info{
  position:fixed;bottom:16px;left:16px;z-index:10;
  color:rgba(255,255,255,0.9);font-size:13px;line-height:1.8;

  border-radius:8px;border:1px solid rgba(255,255,255,0.12);
}
#hint{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  z-index:10;color:rgba(255,255,255,0.25);font-size:11px;pointer-events:none;
}
#panel{
  position:fixed;right:6px;top:6px;z-index:10;
  background:rgba(0,0,0,0.65);padding:8px 10px;border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);max-height:98vh;overflow-y:auto;
  width:300px;font-size:11px;
}
#panel .section{
  color:#ffd700;font-size:12px;font-weight:600;padding:8px 0 3px 0;
  border-top:1px solid rgba(255,255,255,0.15);margin-top:4px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;user-select:none;
}
#panel .section:first-child{border-top:none;margin-top:0}
#panel .section .part-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
#panel .section .vis-toggle{font-size:10px;color:rgba(255,255,255,0.4);cursor:pointer;padding:2px 6px;border-radius:3px;border:1px solid rgba(255,255,255,0.15)}
#panel .section .vis-toggle.on{color:#ffd700;border-color:#ffd700}
#panel label{color:rgba(255,255,255,0.6);font-size:10.5px;display:flex;flex-direction:column;gap:1px;margin-bottom:5px;padding-left:2px}
#panel label .row{display:flex;justify-content:space-between;align-items:center}
#panel label .row .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
#panel input[type="range"]{width:100%;accent-color:#ffd700;height:4px;margin-top:2px}

#panel .sub-label{color:rgba(255,255,255,0.35);font-size:10px;padding-left:2px;margin-bottom:3px}
#copy-btn{
  width:100%;padding:8px;margin-top:10px;background:#ffd700;color:#000;
  border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;
  transition:background 0.2s;
}
#copy-btn:hover{background:#ffe44d}
#copy-btn.copied{background:#44cc88}
#reset-btn{
  width:100%;padding:6px;margin-top:4px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);
  border:1px solid rgba(255,255,255,0.12);border-radius:6px;font-size:11px;cursor:pointer;
}
#reset-btn:hover{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.8)}
</style>
</head>
<body>
<div id="hint">🖱 拖动旋转 | 滚轮缩放 | R 重置视角 | 点击部位名切换显隐</div>
<div id="info"></div>
<div id="panel">
  <div class="section">🌐 全局</div>
  <label><div class="row"><span class="lbl">噪声融合宽度</span><span class="val" id="v-blendWidth">0.15</span></div>
    <input type="range" id="blendWidth" min="0" max="0.40" step="0.01" value="0.15"></label>
  <label><div class="row"><span class="lbl">噪声 X 倍率</span><span class="val" id="v-noiseXMul">0.80</span></div>
    <input type="range" id="noiseXMul" min="0" max="2" step="0.05" value="0.80"></label>
  <label><div class="row"><span class="lbl">噪声 Z 倍率</span><span class="val" id="v-noiseZMul">0.80</span></div>

  <label><div class="row"><span class="lbl">显示粒子大小</span><span class="val" id="v-particleSize">0.020</span></div>

  <label><div class="row"><span class="lbl">融合度 X</span><span class="val" id="v-headBlendX">0.8</span></div>

  <label><div class="row"><span class="lbl">融合度 Z</span><span class="val" id="v-headBlendZ">0.8</span></div>
    <input type="range" id="headBlendZ" min="0" max="3" step="0.05" value="0.8"></label>

  <div class="section" data-part="heart">
    <span>🔴 heart 心脏</span>

  </div>
  <label><div class="row"><span class="lbl">中心 Y %(从底)</span><span class="val" id="v-heartCY">0.71</span></div>

  <label><div class="row"><span class="lbl">椭圆 X 半径 %</span><span class="val" id="v-heartRX">0.30</span></div>

  <label><div class="row"><span class="lbl">椭圆 Z 半径 %</span><span class="val" id="v-heartRZ">0.17</span></div>
    <input type="range" id="heartRZ" min="0.02" max="0.25" step="0.01" value="0.17"></label>
  <label><div class="row"><span class="lbl">椭圆容差</span><span class="val" id="v-heartTol">2.50</span></div>
    <input type="range" id="heartTol" min="0.8" max="3.0" step="0.05" value="2.5"></label>
  <label><div class="row"><span class="lbl">Z 中心偏移</span><span class="val" id="v-heartZOffset">0.00</span></div>

  <label><div class="row"><span class="lbl">融合度 Y</span><span class="val" id="v-heartBlendY">0.45</span></div>
    <input type="range" id="heartBlendY" min="0" max="2" step="0.05" value="0.45"></label>
  <label><div class="row"><span class="lbl">融合度 XZ</span><span class="val" id="v-heartBlendXZ">0.60</span></div>
    <input type="range" id="heartBlendXZ" min="0" max="2" step="0.05" value="0.6"></label>

  <div class="section" data-part="hands">
    <span>🟠 hands 双手</span>
    <span class="vis-toggle on" data-part="hands">显示</span>
  </div>
  <label><div class="row"><span class="lbl">横向阈值 %(宽度)</span><span class="val" id="v-handX">0.28</span></div>
    <input type="range" id="handX" min="0.08" max="0.60" step="0.01" value="0.28"></label>
  <label><div class="row"><span class="lbl">上边界(肩线) %(从顶)</span><span class="val" id="v-handsTopY">0.18</span></div>
    <input type="range" id="handsTopY" min="0.15" max="0.50" step="0.01" value="0.18"></label>
  <label><div class="row"><span class="lbl">下边界 %(从底)</span><span class="val" id="v-handsBotY">0.45</span></div>
    <input type="range" id="handsBotY" min="0.15" max="0.70" step="0.01" value="0.45"></label>
  <label><div class="row"><span class="lbl">融合度 Y</span><span class="val" id="v-handsBlendY">1.0</span></div>
    <input type="range" id="handsBlendY" min="0" max="3" step="0.05" value="1"></label>
  <label><div class="row"><span class="lbl">融合度 X</span><span class="val" id="v-handsBlendX">0.8</span></div>
    <input type="range" id="handsBlendX" min="0" max="3" step="0.05" value="0.8"></label>
  <div class="sub-label">── 躯干排除区（防止躯干粒子被归为手）──</div>
  <label><div class="row"><span class="lbl">排除中心 Y %(从底)</span><span class="val" id="v-handExcludeCY">0.60</span></div>
    <input type="range" id="handExcludeCY" min="0.10" max="0.90" step="0.01" value="0.60"></label>
  <label><div class="row"><span class="lbl">排除半径 X %(宽度)</span><span class="val" id="v-handExcludeRX">0.12</span></div>
    <input type="range" id="handExcludeRX" min="0" max="1.00" step="0.01" value="0.12"></label>
  <label><div class="row"><span class="lbl">排除半径 Y %(高度)</span><span class="val" id="v-handExcludeRY">0.25</span></div>
    <input type="range" id="handExcludeRY" min="0" max="1.00" step="0.01" value="0.25"></label>
  <label><div class="row"><span class="lbl">排除半径 Z %(深度)</span><span class="val" id="v-handExcludeRZ">0.12</span></div>
    <input type="range" id="handExcludeRZ" min="0" max="1.00" step="0.01" value="0.12"></label>
  <label><div class="row"><span class="lbl">排除融合度 X</span><span class="val" id="v-handExcludeBlendX">0.8</span></div>
    <input type="range" id="handExcludeBlendX" min="0" max="10" step="0.1" value="0.8"></label>
  <label><div class="row"><span class="lbl">排除融合度 Y</span><span class="val" id="v-handExcludeBlendY">1.0</span></div>
    <input type="range" id="handExcludeBlendY" min="0" max="10" step="0.1" value="1"></label>
  <label><div class="row"><span class="lbl">排除融合度 Z</span><span class="val" id="v-handExcludeBlendZ">0.8</span></div>
    <input type="range" id="handExcludeBlendZ" min="0" max="10" step="0.1" value="0.8"></label>

  <div class="section" data-part="feet">
    <span>🟢 feet 双脚</span>
    <span class="vis-toggle on" data-part="feet">显示</span>
  </div>
  <label><div class="row"><span class="lbl">横向阈值 %(宽度)</span><span class="val" id="v-footX">0.14</span></div>
    <input type="range" id="footX" min="0.04" max="0.40" step="0.01" value="0.14"></label>
  <label><div class="row"><span class="lbl">上边界(膝线) %(从底)</span><span class="val" id="v-feetTopY">0.22</span></div>
    <input type="range" id="feetTopY" min="0.08" max="0.50" step="0.01" value="0.22"></label>
  <label><div class="row"><span class="lbl">融合度 Y</span><span class="val" id="v-feetBlendY">1.0</span></div>
    <input type="range" id="feetBlendY" min="0" max="3" step="0.05" value="1"></label>
  <label><div class="row"><span class="lbl">融合度 X</span><span class="val" id="v-feetBlendX">0.8</span></div>
    <input type="range" id="feetBlendX" min="0" max="3" step="0.05" value="0.8"></label>

  <div class="section" data-part="body">
    <span>🔵 body 身体</span>
    <span class="vis-toggle on" data-part="body">显示</span>
  </div>
  <div class="sub-label" style="color:rgba(255,255,255,0.3);padding-left:2px;margin-bottom:6px">body = 未被其他部位分类的剩余顶点，无需参数</div>

  <button id="copy-btn">📋 复制当前参数</button>
  <button id="reset-btn">↺ 恢复默认</button>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ 场景 ============
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0,0.5,4); camera.lookAt(0,0.5,0);
const renderer = new THREE.WebGLRenderer({alpha:true,antialias:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x0a0a14); document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera,renderer.domElement);
controls.target.set(0,0.5,0); controls.enableDamping=true;
controls.minDistance=2; controls.maxDistance=15; controls.update();

// ============ 部位定义 ============
const PART_NAMES = ['head','heart','hands','feet','body'];
const partColors = {
  head: new THREE.Color('#FFEA00'),    // 亮黄
  heart: new THREE.Color('#FF1744'),   // 亮红
  hands: new THREE.Color('#FF9100'),   // 亮橙
  feet: new THREE.Color('#00E676'),    // 亮绿
  body: new THREE.Color('#448AFF'),    // 亮蓝
};

// ============ 默认参数 ============
const defaultParams = {
  blendWidth:0.15, noiseXMul:0.80, noiseZMul:0.80, particleSize:0.020, bgBrightness:0.00,
  // head
  headY:0.18, headBlendY:1.0, headBlendX:0.8, headBlendZ:0.8,
  // heart
  heartCY:0.71, heartRX:0.30, heartRY:0.05, heartRZ:0.17, heartTol:2.5, heartZOffset:0, heartBlendY:0.45, heartBlendXZ:0.6,
  // hands
  handX:0.28, handsTopY:0.18, handsBotY:0.45, handsBlendY:1.0, handsBlendX:0.8,
  handExcludeCY:0.60, handExcludeRX:0.12, handExcludeRY:0.25, handExcludeRZ:0.12,
  handExcludeBlendX:0.8, handExcludeBlendY:1.0, handExcludeBlendZ:0.8,
  // feet
  footX:0.14, feetTopY:0.22, feetBlendY:1.0, feetBlendX:0.8,
};
const params = {...defaultParams};
const partVisible = {head:true,heart:true,hands:true,feet:true,body:true};

// ============ 分类函数 ============
function classifyVertices(allVerts) {
  const n = allVerts.length/3;
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity,minZ=Infinity,maxZ=-Infinity;
  for(let i=0;i<n;i++){
    const x=allVerts[i*3],y=allVerts[i*3+1],z=allVerts[i*3+2];
    if(x<minX)minX=x;if(x>maxX)maxX=x;
    if(y<minY)minY=y;if(y>maxY)maxY=y;
    if(z<minZ)minZ=z;if(z>maxZ)maxZ=z;
  }
  const height=maxY-minY,width=maxX-minX,depth=maxZ-minZ;
  const midX=(minX+maxX)/2,midZ=(minZ+maxZ)/2;

  const headY = maxY - height*params.headY;
  const shoulderY = maxY - height*params.handsTopY;
  const kneeY = minY + height*params.feetTopY;
  const handX = width*params.handX;
  const footX = width*params.footX;
  const handsLowerY = minY + height*params.handsBotY;

  // 躯干排除区（防止躯干粒子被归为手）
  const excludeCY = minY + height*params.handExcludeCY;
  const excludeRX = width*params.handExcludeRX, excludeRY = height*params.handExcludeRY, excludeRZ = depth*params.handExcludeRZ;

  const bins={};for(const name of PART_NAMES)bins[name]=[];
  const classified=new Set();

  const hash=(seed)=>{let h=seed*2654435761;h=((h>>16)^h)*0x45d9f3b;return((h>>16)^h)/0x7fffffff};
  const bw=height*params.blendWidth;

  for(let i=0;i<n;i++){
    const x=allVerts[i*3],y=allVerts[i*3+1],z=allVerts[i*3+2];
    const noiseY = (hash(i*3)-0.5)*bw;
    const noiseX = (hash(i*3+1)-0.5)*bw*params.noiseXMul;
    const noiseZ = (hash(i*3+2)-0.5)*bw*params.noiseZMul;

    // heart（椭圆体）
    const hcy = minY + height*params.heartCY + noiseY*params.heartBlendY;
    const hrx = width*params.heartRX, hry = height*params.heartRY, hrz = depth*params.heartRZ;
    if(((x-midX)**2/hrx**2 + (y-hcy)**2/hry**2 + (z-(midZ+depth*params.heartZOffset))**2/hrz**2) <= params.heartTol){
      bins['heart'].push(i); classified.add(i); continue;
    }

    // head
    const myHeadY = headY + noiseY*params.headBlendY;
    if(y > myHeadY){ bins['head'].push(i); classified.add(i); continue; }

    // hands（含躯干排除区：排除区内粒子不归为手）
    // 上边界=肩线(handsTopY)，下边界=handsBotY
    const myShoulderY = shoulderY + noiseY*params.handsBlendY;
    const myHandsLowerY = handsLowerY + noiseY*params.handsBlendY;
    const myHandX = handX + noiseX*params.handsBlendX;
    if(Math.abs(x-midX) > myHandX && y > myHandsLowerY && y < myShoulderY){
      // 躯干排除区椭圆体检测
      const exRZ = Math.max(0.001, excludeRZ + noiseZ*params.handExcludeBlendZ);
      const exRX = Math.max(0.001, excludeRX + noiseX*params.handExcludeBlendX);
      const exRY = Math.max(0.001, excludeRY + noiseY*params.handExcludeBlendY);
      const inExclude = ((x-midX)**2/exRX**2 + (y-excludeCY)**2/exRY**2 + (z-midZ)**2/exRZ**2) <= 1.0;
      if(!inExclude){ bins['hands'].push(i); classified.add(i); continue; }
    }

    // feet
    const myKneeY = kneeY + noiseY*params.feetBlendY;
    const myFootX = footX + noiseX*params.feetBlendX;
    if(Math.abs(x-midX) > myFootX && y < myKneeY){
      bins['feet'].push(i); classified.add(i); continue;
    }
  }

  // body = 未被 head/heart/hands/feet 分类的所有剩余顶点
  for(let i=0;i<n;i++){
    if(!classified.has(i)) bins['body'].push(i);
  }

  return {bins,bb:{minX,maxX,minY,maxY,minZ,maxZ,height,midX,midZ}};
}

// ============ 全局状态 ============
let allVertices=null,vertexGroup=null;
const infoEl=document.getElementById('info');

function rebuildVertexDisplay(){
  if(!allVertices)return;
  if(vertexGroup){scene.remove(vertexGroup);vertexGroup.geometry.dispose();vertexGroup.material.dispose();}

  const {bins,bb}=classifyVertices(allVertices);
  const total=allVertices.length/3;
  const positions=new Float32Array(total*3);
  const colors=new Float32Array(total*3);

  // 未分类顶点：背景色
  const bgBright=params.bgBrightness;
  for(let i=0;i<total;i++){
    colors[i*3]=bgBright;colors[i*3+1]=bgBright;colors[i*3+2]=bgBright;
  }

  let infoHTML='';
  let totalClassified=0;
  for(const name of PART_NAMES){
    const count=bins[name].length;
    let cx=0,cy=0,cz=0;
    for(const idx of bins[name]){
      cx+=allVertices[idx*3];cy+=allVertices[idx*3+1];cz+=allVertices[idx*3+2];
    }
    cx/=count;cy/=count;cz/=count;
    // 可见部位着色，不可见部位也计算但显示为暗色
    if(partVisible[name]){
      const c=partColors[name];
      for(const idx of bins[name]){
        colors[idx*3]=c.r;colors[idx*3+1]=c.g;colors[idx*3+2]=c.b;
      }
      totalClassified+=count;
    }
    infoHTML+=`${partVisible[name]?'●':'○'} ${name} ${count.toLocaleString()} (${cx.toFixed(2)},${cy.toFixed(2)},${cz.toFixed(2)})<br>`;
  }
  infoHTML+=`可视 ${totalClassified.toLocaleString()} / ${total.toLocaleString()}`;

  positions.set(allVertices);
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  const mat=new THREE.PointsMaterial({
    size:params.particleSize,vertexColors:true,blending:THREE.AdditiveBlending,
    depthWrite:false,depthTest:true,transparent:true,opacity:0.85,sizeAttenuation:true,
  });
  vertexGroup=new THREE.Points(geo,mat);
  scene.add(vertexGroup);
  infoEl.innerHTML=infoHTML;
  // 更新背景色
  renderer.setClearColor(new THREE.Color(bgBright,bgBright,bgBright*0.5+0.05));
}

// ============ 加载模型 ============
const loader=new GLTFLoader();
infoEl.innerHTML='加载模型中...';
loader.load('/human-model.glb',(gltf)=>{
  const model=gltf.scene;
  const verts=[];
  model.traverse((child)=>{
    if(child.isMesh){
      const geom=child.geometry;
      const posAttr=geom.getAttribute('position');
      child.updateWorldMatrix(true,false);
      const wm=child.matrixWorld;
      for(let i=0;i<posAttr.count;i++){
        const v=new THREE.Vector3(posAttr.getX(i),posAttr.getY(i),posAttr.getZ(i));
        v.applyMatrix4(wm);verts.push(v.x,v.y,v.z);
      }
    }
  });
  const n=verts.length/3;
  let cx=0,cy=0,cz=0,minY=Infinity;
  for(let i=0;i<n;i++){cx+=verts[i*3];cy+=verts[i*3+1];cz+=verts[i*3+2];if(verts[i*3+1]<minY)minY=verts[i*3+1];}
  cx/=n;cy/=n;cz/=n;
  for(let i=0;i<n;i++){verts[i*3]-=cx;verts[i*3+1]-=minY;verts[i*3+2]-=cz;}
  allVertices=new Float32Array(verts);
  rebuildVertexDisplay();
},null,(err)=>{infoEl.innerHTML='加载失败: '+err.message});

// ============ UI 绑定 ============
const sliderIds=[
  'blendWidth','noiseXMul','noiseZMul','particleSize','bgBrightness',
  'headY','headBlendY','headBlendX','headBlendZ',
  'heartCY','heartRX','heartRY','heartRZ','heartTol','heartZOffset','heartBlendY','heartBlendXZ',
  'handX','handsTopY','handsBotY','handsBlendY','handsBlendX',
  'handExcludeCY','handExcludeRX','handExcludeRY','handExcludeRZ','handExcludeBlendX','handExcludeBlendY','handExcludeBlendZ',
  'footX','feetTopY','feetBlendY','feetBlendX',
];
const paramMap={};
for(const id of sliderIds)paramMap[id]=id;

for(const id of sliderIds){
  const el=document.getElementById(id);
  if(!el)continue;
  el.addEventListener('input',()=>{
    const v=parseFloat(el.value);
    params[id]=v;
    const vEl=document.getElementById('v-'+id);
    if(vEl)vEl.textContent=v;
    rebuildVertexDisplay();
  });
}

// 部位显隐切换
document.querySelectorAll('.vis-toggle').forEach(btn=>{
  btn.addEventListener('click',(e)=>{
    e.stopPropagation();
    const part=btn.dataset.part;
    partVisible[part]=!partVisible[part];
    btn.textContent=partVisible[part]?'显示':'隐藏';
    btn.classList.toggle('on',partVisible[part]);
    rebuildVertexDisplay();
  });
});

// 点击 section 标题也切换显隐
document.querySelectorAll('.section[data-part]').forEach(sec=>{
  sec.addEventListener('click',()=>{
    const part=sec.dataset.part;
    partVisible[part]=!partVisible[part];
    const btn=sec.querySelector('.vis-toggle');
    btn.textContent=partVisible[part]?'显示':'隐藏';
    btn.classList.toggle('on',partVisible[part]);
    rebuildVertexDisplay();
  });
});

// 复制参数
document.getElementById('copy-btn').addEventListener('click',()=>{
  const json=JSON.stringify(params,null,2);
  navigator.clipboard.writeText(json).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='✓ 已复制!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋 复制当前参数';btn.classList.remove('copied');},1500);
  });
});

// 恢复默认
document.getElementById('reset-btn').addEventListener('click',()=>{
  Object.assign(params,defaultParams);
  for(const name of PART_NAMES)partVisible[name]=true;
  document.querySelectorAll('.vis-toggle').forEach(b=>{b.textContent='显示';b.classList.add('on')});
  for(const id of sliderIds){
    const el=document.getElementById(id);
    if(!el)continue;
    el.value=params[id];
    const vEl=document.getElementById('v-'+id);
    if(vEl)vEl.textContent=params[id];
  }
  rebuildVertexDisplay();
});

// ============ 渲染循环 ============
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('keydown',(e)=>{
  if(e.code==='KeyR'){camera.position.set(0,0.5,4);controls.target.set(0,0.5,0);controls.update();}
});
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
