<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粒子分类调参工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0a0a0f; color: #ddd; overflow: hidden; margin: 0; }
  canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

  #panel {
    position: fixed; top: 12px; right: 12px; z-index: 10;
    width: 370px; max-height: calc(100vh - 24px); overflow-y: auto;
    background: rgba(10,10,20,0.92); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
    padding: 18px 16px; font-size: 0.78rem;
  }
  #panel h2 { font-size: 1rem; font-weight: 600; margin-bottom: 2px; color: #fff; }
  #panel .subtitle { font-size: 0.68rem; color: rgba(255,255,255,0.4); margin-bottom: 12px; }

  .section { margin-bottom: 12px; }
  .section-title {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 5px; padding-bottom: 3px;
    border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 6px;
  }
  .section-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .slider-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .slider-row label { width: 64px; text-align: right; font-size: 0.67rem; color: rgba(255,255,255,0.5); flex-shrink: 0; }
  .slider-row input[type=range] { flex: 1; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
  .slider-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: #5588bb; cursor: pointer; }
  .slider-row .val { width: 32px; text-align: right; font-size: 0.67rem; color: rgba(255,255,255,0.65); flex-shrink: 0; font-variant-numeric: tabular-nums; }

  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  .btn {
    flex: 1; padding: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06); color: #fff; font-size: 0.78rem; cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); }
  .btn.primary { background: rgba(85,136,187,0.3); border-color: rgba(85,136,187,0.4); }
  .btn.primary:hover { background: rgba(85,136,187,0.45); }

  #info-bar {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 10;
    background: rgba(10,10,20,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
    padding: 10px 18px; font-size: 0.68rem; display: flex; gap: 14px;
    color: rgba(255,255,255,0.5); white-space: nowrap;
  }
  #info-bar span { color: rgba(255,255,255,0.8); }

  #toast {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 20;
    background: rgba(68,255,102,0.2); border: 1px solid rgba(68,255,102,0.4);
    color: #44ff66; padding: 8px 20px; border-radius: 8px; font-size: 0.78rem;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #toast.show { opacity: 1; }

  .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.63rem; color: rgba(255,255,255,0.4); }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }

  @media (max-width: 768px) {
    #panel { width: 300px; right: 2px; top: 2px; padding: 10px; font-size: 0.68rem; }
    .slider-row label { width: 50px; font-size: 0.6rem; }
    #info-bar { gap: 6px; font-size: 0.58rem; padding: 6px 10px; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="panel">
  <h2>分类参数调试</h2>
  <div class="subtitle">每个部位独立 X/Y/Z 阈值 | 拖动滑块实时调节 | 调好后「复制参数」</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4488ff"></div>head</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff3344"></div>heart</div>
    <div class="legend-item"><div class="legend-dot" style="background:#44ff66"></div>hands</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffffff"></div>body</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffcc00"></div>feet</div>
  </div>

  <!-- 头部 -->
  <div class="section">
    <div class="section-title"><div class="section-dot" style="background:#4488ff"></div>头部 Head</div>
    <div class="slider-row"><label>上界 headY</label><input type="range" id="headTopY" min="0.05" max="0.35" step="0.005" value="0.18"><span class="val" id="headTopY_v">0.18</span></div>
    <div class="slider-row"><label>X范围 headX</label><input type="range" id="headMaxX" min="0.10" max="0.50" step="0.005" value="0.50"><span class="val" id="headMaxX_v">0.50</span></div>
  </div>

  <!-- 心脏 -->
  <div class="section">
    <div class="section-title"><div class="section-dot" style="background:#ff3344"></div>心脏 Heart</div>
    <div class="slider-row"><label>中心Y hrtY</label><input type="range" id="heartY" min="0.45" max="0.75" step="0.005" value="0.62"><span class="val" id="heartY_v">0.62</span></div>
    <div class="slider-row"><label>半径X hrtRX</label><input type="range" id="heartRX" min="0.03" max="0.20" step="0.005" value="0.09"><span class="val" id="heartRX_v">0.09</span></div>
    <div class="slider-row"><label>半径Y hrtRY</label><input type="range" id="heartRY" min="0.03" max="0.20" step="0.005" value="0.07"><span class="val" id="heartRY_v">0.07</span></div>
    <div class="slider-row"><label>半径Z hrtRZ</label><input type="range" id="heartRZ" min="0.03" max="0.20" step="0.005" value="0.07"><span class="val" id="heartRZ_v">0.07</span></div>
  </div>

  <!-- 双手 -->
  <div class="section">
    <div class="section-title"><div class="section-dot" style="background:#44ff66"></div>双手 Hands</div>
    <div class="slider-row"><label>上界 topY</label><input type="range" id="handsTopY" min="0.10" max="0.40" step="0.005" value="0.24"><span class="val" id="handsTopY_v">0.24</span></div>
    <div class="slider-row"><label>下界 botY</label><input type="range" id="handsBotY" min="0.20" max="0.55" step="0.005" value="0.38"><span class="val" id="handsBotY_v">0.38</span></div>
    <div class="slider-row"><label>X内距 minX</label><input type="range" id="handMinX" min="0.10" max="0.50" step="0.005" value="0.28"><span class="val" id="handMinX_v">0.28</span></div>
    <div class="slider-row"><label>X外距 maxX</label><input type="range" id="handMaxX" min="0.30" max="0.70" step="0.005" value="0.55"><span class="val" id="handMaxX_v">0.55</span></div>
  </div>

  <!-- 身体 -->
  <div class="section">
    <div class="section-title"><div class="section-dot" style="background:#ffffff"></div>身体 Body</div>
    <div class="slider-row"><label>上界 topY</label><input type="range" id="bodyTopY" min="0.05" max="0.40" step="0.005" value="0.18"><span class="val" id="bodyTopY_v">0.18</span></div>
    <div class="slider-row"><label>下界 botY</label><input type="range" id="bodyBotY" min="0.20" max="0.70" step="0.005" value="0.45"><span class="val" id="bodyBotY_v">0.45</span></div>
    <div class="slider-row"><label>X范围 maxX</label><input type="range" id="bodyMaxX" min="0.10" max="0.55" step="0.005" value="0.28"><span class="val" id="bodyMaxX_v">0.28</span></div>
  </div>

  <!-- 双脚 -->
  <div class="section">
    <div class="section-title"><div class="section-dot" style="background:#ffcc00"></div>双脚 Feet</div>
    <div class="slider-row"><label>上界 topY</label><input type="range" id="feetTopY" min="0.05" max="0.40" step="0.005" value="0.22"><span class="val" id="feetTopY_v">0.22</span></div>
    <div class="slider-row"><label>X内距 minX</label><input type="range" id="footMinX" min="0.05" max="0.35" step="0.005" value="0.14"><span class="val" id="footMinX_v">0.14</span></div>
    <div class="slider-row"><label>X外距 maxX</label><input type="range" id="footMaxX" min="0.15" max="0.50" step="0.005" value="0.35"><span class="val" id="footMaxX_v">0.35</span></div>
  </div>

  <!-- 全局 -->
  <div class="section">
    <div class="section-title">全局</div>
    <div class="slider-row"><label>边界融合</label><input type="range" id="blendW" min="0.02" max="0.30" step="0.005" value="0.15"><span class="val" id="blendW_v">0.15</span></div>
    <div class="slider-row"><label>粒子大小</label><input type="range" id="particleSize" min="0.003" max="0.06" step="0.001" value="0.025"><span class="val" id="particleSize_v">0.025</span></div>
    <div class="slider-row"><label>采样率</label><input type="range" id="sampleRate" min="1" max="100" step="1" value="100"><span class="val" id="sampleRate_v">100%</span></div>
  </div>

  <div class="btn-row">
    <button class="btn" id="btnReset">恢复默认</button>
    <button class="btn primary" id="btnCopy">复制参数</button>
  </div>
</div>

<div id="info-bar">
  <span id="infoHead">head: --</span>
  <span id="infoHeart">heart: --</span>
  <span id="infoHands">hands: --</span>
  <span id="infoBody">body: --</span>
  <span id="infoFeet">feet: --</span>
</div>
<div id="toast">参数已复制到剪贴板</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ========== 默认参数 ==========
const defaults = {
  headTopY: 0.18, headMaxX: 0.50,
  heartY: 0.62, heartRX: 0.09, heartRY: 0.07, heartRZ: 0.07,
  handsTopY: 0.24, handsBotY: 0.38, handMinX: 0.28, handMaxX: 0.55,
  bodyTopY: 0.18, bodyBotY: 0.45, bodyMaxX: 0.28,
  feetTopY: 0.22, footMinX: 0.14, footMaxX: 0.35,
  blendW: 0.15, sampleRate: 100, particleSize: 0.025,
};

// ========== 部位颜色 ==========
const PART_COLORS = {
  head:  '#4488ff', heart: '#ff3344',
  hands: '#44ff66', body:  '#ffffff', feet:  '#ffcc00',
};
const PART_NAMES = ['head', 'heart', 'hands', 'feet', 'body'];

// ========== Three.js 初始化 ==========
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.5, 1.8);
camera.lookAt(0, 0.5, 0);

// 测试立方体 — 验证渲染管线
const dbgGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
const dbgMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
const dbgCube = new THREE.Mesh(dbgGeo, dbgMat);
dbgCube.position.set(0, 0.5, 0);
scene.add(dbgCube);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

let allVerts = null;
let partGroups = {};

// ========== 粒子纹理 ==========
function createGlowTexture(size, color) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0, color); g.addColorStop(0.3, color); g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}
const glowTex = createGlowTexture(64, 'rgba(255,255,255,1)');

// ========== 居中顶点 ==========
function centerVertices(verts) {
  const n = verts.length / 3;
  let cx = 0, cy = 0, cz = 0, minY = Infinity, maxY = -Infinity;
  for (let i = 0; i < n; i++) {
    cx += verts[i * 3]; cy += verts[i * 3 + 1]; cz += verts[i * 3 + 2];
    if (verts[i * 3 + 1] < minY) minY = verts[i * 3 + 1];
    if (verts[i * 3 + 1] > maxY) maxY = verts[i * 3 + 1];
  }
  cx /= n; cy /= n; cz /= n;
  for (let i = 0; i < n; i++) {
    verts[i * 3] -= cx; verts[i * 3 + 1] -= minY; verts[i * 3 + 2] -= cz;
  }
  console.log(`[debug] 顶点居中完成, 高度: ${(maxY - minY).toFixed(2)}`);
}

// ========== 顶点分类（每个部位独立 X/Y/Z 阈值） ==========
function classifyVertices(verts, params) {
  const n = verts.length / 3;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (let i = 0; i < n; i++) {
    const x = verts[i*3], y = verts[i*3+1], z = verts[i*3+2];
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
    if (z < minZ) minZ = z; if (z > maxZ) maxZ = z;
  }
  const height = maxY - minY, width = maxX - minX, depth = maxZ - minZ;
  const midX = (minX + maxX) / 2, midZ = (minZ + maxZ) / 2;

  // --- 头部 ---
  const headTopY = maxY - height * params.headTopY;
  const headMaxX = width * params.headMaxX;

  // --- 心脏 ---
  const heartCY = minY + height * params.heartY;
  const hrx = width * params.heartRX;
  const hry = height * params.heartRY;
  const hrz = depth * params.heartRZ;

  // --- 双手 ---
  const handsTopY = maxY - height * params.handsTopY;
  const handsBotY = maxY - height * params.handsBotY;
  const handMinX = width * params.handMinX;
  const handMaxX = width * params.handMaxX;

  // --- 身体 ---
  const bodyTopY = maxY - height * params.bodyTopY;
  const bodyBotY = minY + height * params.bodyBotY;
  const bodyMaxX = width * params.bodyMaxX;

  // --- 双脚 ---
  const feetTopY = minY + height * params.feetTopY;
  const footMinX = width * params.footMinX;
  const footMaxX = width * params.footMaxX;

  // --- 噪声 ---
  const blendWidth = height * params.blendW;
  const hash = (seed) => { let h = seed * 2654435761; h = ((h >> 16) ^ h) * 0x45d9f3b; return ((h >> 16) ^ h) / 0x7fffffff; };

  const bins = {};
  for (const name of PART_NAMES) bins[name] = [];
  const partLabel = new Array(n).fill(null);

  for (let i = 0; i < n; i++) {
    const x = verts[i*3], y = verts[i*3+1], z = verts[i*3+2];
    const dx = Math.abs(x - midX);

    const noiseY = (hash(i*3) - 0.5) * blendWidth;
    const noiseX = (hash(i*3+1) - 0.5) * blendWidth * 0.8;
    const noiseZ = (hash(i*3+2) - 0.5) * blendWidth * 0.8;

    // 1) 心脏：椭圆体，胸口正中
    const hCY = heartCY + noiseY * 0.6;
    if (((x - midX)**2 / hrx**2 + (y - hCY)**2 / hry**2 + (z - (midZ + depth * 0.08))**2 / hrz**2) <= 1.15) {
      partLabel[i] = 'heart'; continue;
    }

    // 2) 头部：Y 在头部线以上，X 在头部宽度内
    if (y > headTopY + noiseY && dx < headMaxX + noiseX) {
      partLabel[i] = 'head'; continue;
    }

    // 3) 双脚：Y 在膝线以下，X 在脚部范围
    if (y < feetTopY + noiseY && dx > footMinX + noiseX && dx < footMaxX + noiseX) {
      partLabel[i] = 'feet'; continue;
    }

    // 4) 双手：Y 在手臂范围，X 在手臂宽度范围
    if (dx > handMinX + noiseX && dx < handMaxX + noiseX &&
        y > handsBotY + noiseY && y < handsTopY + noiseY) {
      partLabel[i] = 'hands'; continue;
    }

    // 5) 身体：X 在身体宽度内，Y 在身体范围
    if (dx < bodyMaxX + noiseX && y > bodyBotY + noiseY && y <= bodyTopY + noiseY) {
      partLabel[i] = 'body'; continue;
    }

    // 兜底：归于身体
    partLabel[i] = 'body';
  }

  for (let i = 0; i < n; i++) {
    if (partLabel[i]) bins[partLabel[i]].push(i);
  }

  return { bins, bb: { minX, maxX, minY, maxY, minZ, maxZ, height, width, depth, midX, midZ } };
}

// ========== 采样 ==========
function sampleIndices(indices, targetCount) {
  if (indices.length <= targetCount) return indices.slice();
  const sampled = [];
  const step = indices.length / targetCount;
  for (let i = 0; i < targetCount; i++) sampled.push(indices[Math.floor(i * step)]);
  return sampled;
}

// ========== 重建粒子 ==========
function rebuildParticles(params) {
  for (const name of PART_NAMES) {
    if (partGroups[name]) {
      scene.remove(partGroups[name]);
      partGroups[name].geometry.dispose();
      partGroups[name].material.dispose();
      partGroups[name] = null;
    }
  }

  const { bins } = classifyVertices(allVerts, params);

  const infoParts = ['head', 'heart', 'hands', 'body', 'feet'];
  infoParts.forEach(name => {
    const arr = bins[name];
    const el = document.getElementById('info' + name[0].toUpperCase() + name.slice(1));
    if (arr.length === 0) { el.textContent = name + ': 0'; return; }
    let cx = 0, cy = 0, cz = 0;
    for (const idx of arr) { cx += allVerts[idx*3]; cy += allVerts[idx*3+1]; cz += allVerts[idx*3+2]; }
    cx /= arr.length; cy /= arr.length; cz /= arr.length;
    el.textContent = `${name}: (${cx.toFixed(2)}, ${cy.toFixed(2)}, ${cz.toFixed(2)}) ×${arr.length}`;
    console.log(`[classify] ${name}: center=(${cx.toFixed(2)}, ${cy.toFixed(2)}, ${cz.toFixed(2)}), vertices=${arr.length}`);
  });

  const sampleRate = params.sampleRate / 100;
  const pSize = params.particleSize || 0.025;
  for (const name of PART_NAMES) {
    const indices = bins[name];
    if (indices.length === 0) continue;
    const targetCount = Math.max(1, Math.floor(indices.length * sampleRate));
    const sampled = sampleIndices(indices, targetCount);

    const positions = new Float32Array(sampled.length * 3);
    const colors = new Float32Array(sampled.length * 3);
    const color = new THREE.Color(PART_COLORS[name]);

    for (let i = 0; i < sampled.length; i++) {
      const idx = sampled[i] * 3;
      positions[i*3] = allVerts[idx]; positions[i*3+1] = allVerts[idx+1]; positions[i*3+2] = allVerts[idx+2];
      colors[i*3] = color.r; colors[i*3+1] = color.g; colors[i*3+2] = color.b;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.PointsMaterial({
      size: pSize, map: glowTex, vertexColors: true,
      blending: THREE.AdditiveBlending, depthWrite: false, depthTest: true,
      transparent: true, opacity: 0.85, sizeAttenuation: true,
    });

    partGroups[name] = new THREE.Points(geo, mat);
    scene.add(partGroups[name]);
  }
}

// ========== 滑块读写 ==========
const sliderIds = [
  'headTopY','headMaxX',
  'heartY','heartRX','heartRY','heartRZ',
  'handsTopY','handsBotY','handMinX','handMaxX',
  'bodyTopY','bodyBotY','bodyMaxX',
  'feetTopY','footMinX','footMaxX',
  'blendW','particleSize','sampleRate',
];

function getParams() {
  const p = {};
  for (const id of sliderIds) {
    const el = document.getElementById(id);
    p[id] = id === 'sampleRate' ? parseInt(el.value) : parseFloat(el.value);
  }
  return p;
}

function setSliders(params) {
  for (const [key, val] of Object.entries(params)) {
    const el = document.getElementById(key);
    if (el) {
      el.value = val;
      const vEl = document.getElementById(key + '_v');
      if (vEl) vEl.textContent = key === 'sampleRate' ? val + '%' : val.toFixed(3);
    }
  }
}

// ========== 事件绑定 ==========
let rebuildTimeout = null;
function scheduleRebuild() {
  clearTimeout(rebuildTimeout);
  rebuildTimeout = setTimeout(() => rebuildParticles(getParams()), 60);
}

for (const id of sliderIds) {
  document.getElementById(id).addEventListener('input', () => {
    const v = document.getElementById(id).value;
    const vEl = document.getElementById(id + '_v');
    if (vEl) vEl.textContent = id === 'sampleRate' ? v + '%' : parseFloat(v).toFixed(3);
    scheduleRebuild();
  });
}

document.getElementById('btnReset').addEventListener('click', () => {
  setSliders(defaults); rebuildParticles(defaults);
});

document.getElementById('btnCopy').addEventListener('click', () => {
  const params = getParams();
  const json = JSON.stringify(params, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
  console.log('[copy] 参数:\n' + json);
});

// ========== 加载模型 ==========
const loader = new GLTFLoader();
console.log('[debug] 加载模型...');
loader.load('/human-model.glb', (gltf) => {
  const model = gltf.scene;
  const vertices = [];
  let totalVerts = 0;
  model.traverse((child) => {
    if (child.isMesh) {
      const geom = child.geometry, posAttr = geom.getAttribute('position');
      child.updateWorldMatrix(true, false);
      const wm = child.matrixWorld;
      for (let i = 0; i < posAttr.count; i++) {
        const v = new THREE.Vector3(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i));
        v.applyMatrix4(wm);
        vertices.push(v.x, v.y, v.z);
      }
      totalVerts += posAttr.count;
    }
  });
  console.log(`[debug] 顶点: ${totalVerts.toLocaleString()}`);
  allVerts = new Float32Array(vertices);
  centerVertices(allVerts);
  rebuildParticles(defaults);
}, (p) => { if (p.total) console.log(`[debug] 加载 ${Math.round(p.loaded/p.total*100)}%`); },
   (e) => console.error('[debug] 加载失败:', e));

// ========== 渲染循环 ==========
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

console.log('[debug] 就绪 — 20个独立参数 | 拖动滑块实时调节 | 调好后复制参数');
console.log('[debug] 拖拽旋转 | 滚轮缩放 | 右键平移');
